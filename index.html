<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #b8860b; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .type-selector {
            display: flex;
            margin-bottom: 20px;
            background: #eee;
            border-radius: 25px;
            padding: 4px;
        }
        .type-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 21px;
            transition: 0.3s;
            font-weight: bold;
        }
        .active {
            background-color: #b8860b;
            color: white;
        }
        
        button { 
            width: 100%; padding: 15px; background-color: #b8860b; color: white; border: none; 
            border-radius: 25px; font-size: 18px; cursor: pointer; margin-top: 10px;
        }
        #status { font-size: 12px; color: #888; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="status">準備中...</div>

    <div class="type-selector">
        <div id="type-expense" class="type-option active" onclick="switchType('支出')">支出</div>
        <div id="type-income" class="type-option" onclick="switchType('収入')">収入</div>
    </div>

    <form id="expenseForm">
        <div class="form-group">
            <label>日付</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
            <label>カテゴリー</label>
            <select name="category" id="category"></select>
        </div>
        <div class="form-group">
            <label>金額</label>
            <input type="number" name="amount" placeholder="1000" required>
        </div>
        <div class="form-group">
            <label>内容</label>
            <input type="text" name="memo" placeholder="スーパーなど">
        </div>
        <div class="form-group">
            <label>支払者</label>
            <select name="payer" id="payerSelect">
                <option value="Saki">Saki</option>
                <option value="Ryouhei">Ryouhei</option>
            </select>
        </div>
        <button type="button" onclick="submitForm()">保存する</button>
    </form>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // 設定値（ここを実際のIDに書き換えてください）
        const LIFF_ID_SAKI = "2009743237-PSUSnXEr"; 
        const LIFF_ID_RYOUHEI = "2009743237-8Pin4IP2";

        const categories = {
          '支出': ['食費', '日用品', '家賃', '電気ガス', '水道', '通信費', '貯金', 'その他（支出）'],
          '収入': ['遼平給料', '紗希給料', 'その他（収入）']
        };

        function switchType(type) {
            const expenseTab = document.getElementById('type-expense');
            const incomeTab = document.getElementById('type-income');
            const categorySelect = document.getElementById('category');

            if (type === '支出') {
                expenseTab.classList.add('active');
                incomeTab.classList.remove('active');
            } else {
                incomeTab.classList.add('active');
                expenseTab.classList.remove('active');
            }

            categorySelect.innerHTML = '';
            categories[type].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.text = cat;
                categorySelect.appendChild(option);
            });
        }

        // 初期化処理
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('date').value = new Date().toISOString().substring(0, 10);
            switchType('支出');
            
            initializeLiff();
        });

        function initializeLiff() {
            const statusDisp = document.getElementById('status');

            // どちらか一方のIDで初期化（どちらのIDを使っても共通のGASに飛びます）
            liff.init({ liffId: LIFF_ID_SAKI })
                .then(() => {
                    const currentId = liff.id; // 今開いているLIFFのIDを取得
                    const payerSelect = document.getElementById('payerSelect');

                    // IDによる自動判定
                    if (currentId === LIFF_ID_RYOUHEI) {
                        payerSelect.value = "Ryouhei";
                        statusDisp.innerText = "Ryouheiモードで起動しました";
                    } else {
                        payerSelect.value = "Saki";
                        statusDisp.innerText = "Sakiモードで起動しました";
                    }
                })
                .catch((err) => {
                    statusDisp.innerText = "初期化エラー";
                    console.error(err);
                });
        }

        function submitForm() {
            const form = document.getElementById('expenseForm');
            const button = form.querySelector('button');
            button.disabled = true;
            button.innerText = '保存中...';

            const formData = {
                date: form.date.value,
                category: form.category.value,
                amount: form.amount.value,
                memo: form.memo.value,
                payer: form.payer.value
            };

            const gasurl = "https://script.google.com/macros/s/AKfycbw_xNBn6xv7Z4Q3fbV_fo81e2-cs-I1qbhZ6JdopBrVFvRnB_zJvBofaQwCKvOS2YxY/exec";
            

            fetch(gasUrl, {
                method: "POST",
                body: JSON.stringify(formData)
            })
            .then(response => response.text())
            .then(result => {
                alert(result);
                button.disabled = false;
                button.innerText = '保存する';
                form.amount.value = '';
                form.memo.value = '';
            })
            .catch(err => {
                alert("通信エラー: " + err);
                button.disabled = false;
                button.innerText = '保存する';
            });
        }
    </script>
</body>
</html>
